<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>群友面基统计 - 关系可视化网络</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #1e293b;
            padding: 20px;
        }

        /* 登录遮罩 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 32px 28px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
            color: #0f3b5f;
        }

        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        .login-card input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .login-card button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 12px 20px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .login-card button:hover {
            background: #2563eb;
        }

        /* 设置新用户内嵌 */
        .setup-profile {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }

        /* 主界面 */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: none;
        }

        /* 头部信息栏 */
        .header-bar {
            background: white;
            border-radius: 28px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .avatar-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
        }

        .avatar-preview-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            cursor: pointer;
        }

        .avatar-preview-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar-upload-btn {
            background: #eef2ff;
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .avatar-upload-btn:hover {
            background: #e2e8f0;
            border-color: #3b82f6;
        }

        .file-input-hidden {
            display: none;
        }

        .user-detail {
            line-height: 1.4;
        }

        .user-detail .nickname {
            font-size: 20px;
            font-weight: bold;
        }

        .user-detail .username {
            font-size: 13px;
            color: #64748b;
        }

        .edit-btn, .logout-btn {
            background: #eef2ff;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            margin-left: 8px;
        }

        .edit-btn:hover, .logout-btn:hover {
            background: #e2e8f0;
        }

        /* 网格布局: 左侧图表，右侧面板 */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        @media (max-width: 800px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .graph-card {
            background: white;
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .graph-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #relationChart {
            width: 100%;
            height: 520px;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .panel-card h3 {
            font-size: 18px;
            margin-bottom: 14px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }

        .friend-select {
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            margin: 12px 0;
        }

        input, textarea, select {
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            padding: 10px 14px;
            width: 100%;
            margin: 6px 0;
            font-family: inherit;
        }

        button.primary {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button.primary:hover {
            background: #2563eb;
        }

        .record-list {
            max-height: 260px;
            overflow-y: auto;
            font-size: 14px;
        }

        .record-item {
            background: #f1f5f9;
            margin: 8px 0;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
        }

        .record-item:hover {
            background: #e2e8f0;
        }

        .user-badge {
            display: inline-block;
            background: #e0f2fe;
            padding: 4px 12px;
            border-radius: 30px;
            margin: 4px 6px 4px 0;
            cursor: pointer;
            font-size: 13px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }

        hr {
            margin: 12px 0;
        }

        .delete-account-btn {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            margin-left: 8px;
        }

        .delete-account-btn:hover {
            background: #fecaca;
        }

        .danger-btn {
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .danger-btn:hover {
            background: #b91c1c;
        }

        .small-delete-btn {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 8px;
            border-radius: 50%;
            transition: 0.15s;
            float: right;
        }

        .small-delete-btn:hover {
            background: #fef2f2;
        }

        .bind-btn {
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 4px;
            transition: 0.15s;
        }

        .bind-btn:hover {
            background: #d97706;
        }

        .unbound-record {
            background: #fffbeb;
            border: 1px dashed #fcd34d;
            margin: 8px 0;
            padding: 10px;
            border-radius: 20px;
        }

        .confirm-warning {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            color: #991b1b;
            font-size: 13px;
        }

        .meeting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
        }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-friends" style="font-size: 48px; color: #3b82f6; margin-bottom: 12px;"></i>
        <h2>群友面基站</h2>
        <p style="margin-bottom: 12px;">输入你的用户名 (无需密码)</p>
        <input type="text" id="loginUsername" placeholder="用户名, 例如: 小明" autocomplete="off">
        <button id="doLoginBtn">登录 / 注册</button>
        <div style="font-size:12px; margin-top:16px; color:#64748b;">* 新用户初次登录将引导设置昵称和头像</div>
    </div>
</div>

<!-- 主应用界面 -->
<div id="appContainer" class="app-container">
    <div class="header-bar">
        <div class="user-info">
            <div id="currentAvatar" class="avatar-circle">?</div>
            <div class="user-detail">
                <div><span id="currentNickname" class="nickname">加载中...</span></div>
                <div><span id="currentUsername" class="username">@</span></div>
            </div>
            <button id="editProfileBtn" class="edit-btn"><i class="fas fa-pen"></i> 编辑资料</button>
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> 切换账号</button>
            <button id="deleteAccountBtn" class="delete-account-btn"><i class="fas fa-trash-alt"></i> 删除账号</button>
        </div>
        <div style="font-size:14px;"><i class="fas fa-chalkboard-user"></i> 点击节点/连线查看详情</div>
    </div>

    <div class="dashboard">
        <!-- 左侧可视化图 -->
        <div class="graph-card">
            <div class="graph-title"><i class="fas fa-network-wired"></i> 面基关系网 (连线代表有面基)</div>
            <div id="relationChart" style="height: 520px;"></div>
            <div style="font-size:12px; text-align:center; margin-top:8px;">💡 提示: 悬浮看次数/备注, 点击连线查看完整面基记录</div>
        </div>
        
        <!-- 右侧功能区 -->
        <div class="right-panel">
            <!-- 新增面基卡片 -->
            <div class="panel-card">
                <h3><i class="fas fa-handshake"></i> 记录新面基</h3>
                <select id="targetUserSelect" class="friend-select">
                    <option value="">选择面基对象</option>
                    <option value="__unbound__">📌 暂不绑定群友 (稍后绑定)</option>
                </select>
                <input type="text" id="tempNameInput" placeholder="临时名字 (仅暂不绑定时填写)" style="display:none;">
                <input type="date" id="meetDate" value="">
                <textarea id="meetNotes" rows="2" placeholder="备注 (地点/趣事等)"></textarea>
                <button id="addMeetRecordBtn" class="primary"><i class="fas fa-plus-circle"></i> 添加面基记录</button>
            </div>

            <!-- 待绑定面基记录 -->
            <div class="panel-card" id="unboundMeetsCard">
                <h3><i class="fas fa-clock"></i> 待绑定面基记录</h3>
                <div id="unboundMeetsList" class="record-list" style="max-height:200px;">暂无待绑定记录</div>
            </div>
            
            <!-- 我的面基记录 (与我相关的所有面基) -->
            <div class="panel-card">
                <h3><i class="fas fa-book-open"></i> 我的面基记录</h3>
                <div id="myMeetsList" class="record-list">加载中...</div>
            </div>
            
            <!-- 所有群友 & 查看其他人记录 -->
            <div class="panel-card">
                <h3><i class="fas fa-users"></i> 群友爱豆</h3>
                <div id="allUsersList" style="max-height: 180px; overflow-y: auto;">加载中...</div>
                <div style="margin-top: 12px;">
                    <input type="text" id="searchOtherUser" placeholder="🔍 输入用户名查看面基记录">
                    <button id="viewOtherRecordBtn" style="margin-top: 4px;" class="primary">查看该群友面基史</button>
                </div>
                <div id="otherRecordResult" style="margin-top: 12px; font-size:13px; background:#f8fafc; border-radius: 20px; padding:10px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- Firebase 配置（请替换成自己的项目配置）----------
    // 使用说明: 去 Firebase 控制台创建项目，启用 Firestore，复制以下配置
const firebaseConfig = {
  apiKey: "AIzaSyDLU0g8mwEhEgjAVzBFc1GhVfWsqSKhDJ4",
  authDomain: "qunyoumianji.firebaseapp.com",
  projectId: "qunyoumianji",
  storageBucket: "qunyoumianji.firebasestorage.app",
  messagingSenderId: "225518606454",
  appId: "1:225518606454:web:932b42012dcecf2f932757",
  measurementId: "G-QMVD46QWN4"
};
    // 注意: 为了测试，请务必替换成真实配置，否则无法使用。配置获取方式见部署说明。
    // 为了演示代码完整性，如果未配置将给出提示
    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log("Firebase 初始化成功");
    } catch (e) {
        console.warn("Firebase 初始化失败，请检查 config", e);
        alert("请先在代码中设置正确的 Firebase 配置，具体见部署说明。");
    }

    // 全局状态
    let currentUser = null;      // 存储用户名 (文档ID)
    let currentUserData = null;  // {nickname, avatarColor}
    let allUsersMap = new Map();  // username -> {nickname, avatarColor}
    let allRelations = [];        // 关系列表 {id, user1, user2, meetings: [{date, notes}]}
    let allPendingMeets = [];    // 待绑定面基记录 {id, userId, date, notes}
    let chartInstance = null;

    // 辅助函数: 生成随机浅色背景
    function getRandomColor(seed) {
        const hue = (seed * 73) % 360;
        return `hsl(${hue}, 70%, 65%)`;
    }

    // 获取头像展示字符 (昵称首字)
    function getAvatarChar(nickname) {
        if (!nickname) return "?";
        return nickname.charAt(0).toUpperCase();
    }

    // 渲染图表
    async function renderGraph() {
        if (!chartInstance) {
            chartInstance = echarts.init(document.getElementById("relationChart"));
        }
        // 获取所有用户节点
        const nodes = [];
        const nodeMap = new Map();
        for (let [uid, data] of allUsersMap.entries()) {
            const color = data.avatarColor || getRandomColor(uid.length);
            const nodeConfig = {
                id: uid,
                name: data.nickname || uid,
                symbolSize: 42,
                label: { show: true, formatter: data.nickname || uid, fontSize: 12, offset: [0, 15] }
            };
            if (data.avatarImage) {
                nodeConfig.symbol = `image://${data.avatarImage}`;
            } else {
                nodeConfig.itemStyle = { color: color };
            }
            nodes.push(nodeConfig);
            nodeMap.set(uid, true);
        }
        // 构建边
        const links = [];
        for (let rel of allRelations) {
            const u1 = rel.user1;
            const u2 = rel.user2;
            if (nodeMap.has(u1) && nodeMap.has(u2) && rel.meetings && rel.meetings.length > 0) {
                const meetCount = rel.meetings.length;
                const lastMeet = rel.meetings[rel.meetings.length-1];
                const tipText = `面基 ${meetCount} 次\n最近: ${lastMeet.date || '未知'} ${lastMeet.notes ? `\n备注: ${lastMeet.notes}` : ''}`;
                links.push({
                    source: u1,
                    target: u2,
                    label: { show: false },
                    lineStyle: { width: 2 + Math.min(meetCount, 5), curveness: 0.2, color: '#f59e0b' },
                    tooltip: tipText,
                    meetCount: meetCount,
                    relationId: rel.id
                });
            }
        }
        const option = {
            title: { show: false },
            tooltip: { trigger: 'item', formatter: (params) => {
                if (params.dataType === 'edge') {
                    return params.data.tooltip || `面基次数: ${params.data.meetCount || 0}`;
                } else if (params.dataType === 'node') {
                    const userNode = params.data;
                    return `<strong>${userNode.name}</strong><br>点击查看该群友的面基记录`;
                }
                return '';
            } },
            series: [{
                type: 'graph',
                layout: 'force',
                force: { repulsion: 350, edgeLength: 160, gravity: 0.35, friction: 0.2, layoutAnimation: true },
                center: ['50%', '50%'],
                roam: true,
                draggable: true,
                data: nodes,
                links: links,
                focusNodeAdjacency: false,
                edgeSymbol: ['none', 'arrow'],
                edgeSymbolSize: [0, 8],
                label: { show: true, position: 'bottom', fontSize: 12 },
                emphasis: { scale: true },
                lineStyle: { color: 'source', curveness: 0.2, width: 2 }
            }]
        };
        chartInstance.setOption(option, true);
        // 点击事件: 获取节点或边信息
        chartInstance.off('click');
        chartInstance.on('click', (params) => {
            if (params.dataType === 'node') {
                const username = params.data.id;
                showUserMeetRecords(username);
            } else if (params.dataType === 'edge') {
                const relationId = params.data.relationId;
                const relation = allRelations.find(r => r.id === relationId);
                if (relation) {
                    showRelationDetailModal(relation);
                }
            }
        });
    }

    // 展示某个用户的所有面基记录 (模态框或侧边展示)
    async function showUserMeetRecords(username) {
        if (!username || !allUsersMap.has(username)) return;
        const userInfo = allUsersMap.get(username);
        const nickname = userInfo.nickname || username;
        // 找出所有包含此用户的关系
        const userRelations = allRelations.filter(rel => rel.user1 === username || rel.user2 === username);
        if (userRelations.length === 0) {
            alert(`${nickname} 还没有任何面基记录。`);
            return;
        }
        let html = `<div style="font-weight:bold; margin-bottom:12px;">📌 ${nickname} (@${username}) 的面基记录</div>`;
        for (let rel of userRelations) {
            const other = rel.user1 === username ? rel.user2 : rel.user1;
            const otherInfo = allUsersMap.get(other) || { nickname: other };
            const meetList = rel.meetings || [];
            html += `<div style="background:#f1f5f9; margin:8px 0; padding:10px; border-radius:20px;">
                        <strong>👤 与 ${otherInfo.nickname || other}</strong> (共 ${meetList.length} 次)<br>`;
            meetList.forEach((m, idx) => {
                html += `<span style="font-size:12px;">📅 ${m.date || '日期未填'} | ${m.notes || '无备注'}</span><br>`;
            });
            html += `</div>`;
        }
        showModal("面基记录详情", html);
    }

    function showRelationDetailModal(relation) {
        const userA = allUsersMap.get(relation.user1)?.nickname || relation.user1;
        const userB = allUsersMap.get(relation.user2)?.nickname || relation.user2;
        const isMyRelation = (relation.user1 === currentUser || relation.user2 === currentUser);
        let meetingsHtml = '';
        (relation.meetings || []).forEach((m, idx) => {
            let deleteBtn = '';
            if (isMyRelation) {
                deleteBtn = `<button class="small-delete-btn detail-meeting-delete" data-relid="${relation.id}" data-meetidx="${idx}" title="删除该条记录"><i class="fas fa-times"></i></button>`;
            }
            meetingsHtml += `<div class="meeting-item">
                <span>📅 ${m.date || '无日期'} — ${m.notes || '无备注'}</span>
                ${deleteBtn}
            </div>`;
        });
        const content = `<div><strong>${userA}</strong> 与 <strong>${userB}</strong> 的面基记录 (${relation.meetings?.length || 0}次)</div>
            <div style="margin-top:10px;">${meetingsHtml}</div>
            ${isMyRelation ? `<button id="deleteEntireRelationBtn" class="danger-btn" style="margin-top:12px;"><i class="fas fa-trash-alt"></i> 删除全部记录</button>` : ''}`;
        showModal("连线详情", content);
        // 绑定单条删除按钮

                    }
                };
            });

            const deleteAllBtn = document.getElementById('deleteEntireRelationBtn');

                deleteAllBtn.onclick = async () => {
                    if (confirm(`确定要删除与对方的全部面基记录吗？此操作不可撤销。`)) {

    // 加载所有用户数据和所有关系数据
    async function loadAllData() {
        if (!db) return;
        // 获取所有用户
        const usersSnap = await db.collection("users").get();
        allUsersMap.clear();
        usersSnap.forEach(doc => {
            const data = doc.data();
            allUsersMap.set(doc.id, {
                nickname: data.nickname || doc.id,
                avatarColor: data.avatarColor || getRandomColor(doc.id.length),
                avatarImage: data.avatarImage || ''
            });
        });
        // 获取所有关系
        const relSnap = await db.collection("relations").get();
        allRelations = [];
        relSnap.forEach(doc => {
            const data = doc.data();
            allRelations.push({ id: doc.id, ...data });
        });
        // 获取当前用户的待绑定记录
        allPendingMeets = [];
        if (currentUser) {
            const pendingSnap = await db.collection("pendingMeets").where("userId", "==", currentUser).get();
            pendingSnap.forEach(doc => {
                allPendingMeets.push({ id: doc.id, ...doc.data() });
            });
        }
        // 更新界面组件
        updateUIComponents();
        await renderGraph();
    }

    // 添加或更新面基记录 (同两人之间追加meeting)
    async function addMeetRecord(targetUser, date, notes) {
        if (!currentUser || !targetUser || targetUser === currentUser) {
            alert("请选择有效的面基对象");
            return;
        }
        if (!date) {
            alert("请填写面基日期");
            return;
        }
        const id1 = currentUser;
        const id2 = targetUser;
        const relationId = id1 < id2 ? `${id1}#${id2}` : `${id2}#${id1}`;
        const relationRef = db.collection("relations").doc(relationId);
        const docSnap = await relationRef.get();
        let meetings = [];
        if (docSnap.exists) {
            meetings = docSnap.data().meetings || [];
        }
        meetings.push({ date: date, notes: notes || "" });
        await relationRef.set({
            user1: id1,
            user2: id2,
            meetings: meetings
        });
        // 同时确保双方用户存在？已存在。
        await loadAllData();
        alert("面基记录添加成功！");
    }

    async function updateUserProfile(nickname, avatarColor, avatarImage) {
        if (!currentUser) return;
        const userRef = db.collection("users").doc(currentUser);

            nickname: nickname,
            avatarColor: avatarColor

        if (typeof avatarImage !== 'undefined') {

        if (!el) return;
        const nickname = userData.nickname || '';

    // 生成用户头像HTML片段 (用于列表/节点)
    function getAvatarHtml(userData, size) {
        const nickname = userData.nickname || '';
        const avatarImage = userData.avatarImage || '';
        const avatarColor = userData.avatarColor || getRandomColor((nickname || '').length);
        const sizeStyle = `width:${size}px; height:${size}px; line-height:${size}px; font-size:${Math.floor(size*0.45)}px;`;
        if (avatarImage) {
            return `<span style="background:transparent; display:inline-block; ${sizeStyle} border-radius:50%; text-align:center; color:white; margin-right:8px; overflow:hidden; vertical-align:middle;"><img src="${avatarImage}" alt="${nickname}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></span>`;
        }
        return `<span style="background:${avatarColor}; display:inline-block; ${sizeStyle} border-radius:50%; text-align:center; color:white; margin-right:8px; vertical-align:middle;">${getAvatarChar(nickname)}</span>`;
    }

    // 登录主逻辑
    async function login(username) {
        if (!db) { alert("Firebase未正确配置，请检查config"); return; }
        const trimmed = username.trim().toLowerCase();
        if (!trimmed) { alert("请输入用户名"); return; }
        const userDoc = await db.collection("users").doc(trimmed).get();
        if (!userDoc.exists) {
            // 新用户引导设置面板
            const newNick = prompt("欢迎新群友！请输入你的昵称:", trimmed);
            if (!newNick) return;
            const avatarColor = getRandomColor(trimmed.length);
            await db.collection("users").doc(trimmed).set({
                nickname: newNick,
                avatarColor: avatarColor
            });
            currentUser = trimmed;
            currentUserData = { nickname: newNick, avatarColor };
        } else {
            currentUser = trimmed;
            currentUserData = userDoc.data();
        }
        // 加载全局数据并刷新
        await loadAllData();
        // 显示主界面
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        refreshCurrentUserDisplay();
    }

    // 删除单条面基记录
    async function deleteMeetupRecord(relationId, meetingIndex) {
        if (!db) return;
        const relationRef = db.collection("relations").doc(relationId);
        const docSnap = await relationRef.get();
        if (!docSnap.exists) return;
        let meetings = docSnap.data().meetings || [];
        if (meetingIndex < 0 || meetingIndex >= meetings.length) return;
        meetings.splice(meetingIndex, 1);
        if (meetings.length === 0) {
            await relationRef.delete();
        } else {
            await relationRef.update({ meetings: meetings });
        }
        await loadAllData();
    }

    // 删除整段面基关系
    async function deleteEntireRelation(relationId) {
        if (!db) return;
        await db.collection("relations").doc(relationId).delete();
        await loadAllData();
    }

    // 删除账号
    async function deleteAccount() {
        if (!db || !currentUser) return;
        // 删除所有涉及当前用户的关系
        const relSnap = await db.collection("relations").get();
        const batch = db.batch();
        let deleteCount = 0;
        relSnap.forEach(doc => {
            const data = doc.data();
            if (data.user1 === currentUser || data.user2 === currentUser) {
                batch.delete(doc.ref);
                deleteCount++;
            }
        });
        // 删除待绑定记录
        const pendingSnap = await db.collection("pendingMeets").where("userId", "==", currentUser).get();
        pendingSnap.forEach(doc => {
            batch.delete(doc.ref);
            deleteCount++;
        });
        // 删除用户文档
        batch.delete(db.collection("users").doc(currentUser));
        await batch.commit();
        alert("账号已删除，相关的 " + deleteCount + " 条记录已被清理。");
        logout();
    }

    // 添加一条待绑定面基记录
    async function addUnboundMeetup(date, notes, tempName) {
        if (!db || !currentUser) return;
        if (!date) { alert("请填写面基日期"); return; }
        await db.collection("pendingMeets").add({
            userId: currentUser,
            date: date,
            notes: notes || "",
            tempName: tempName || "",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await loadAllData();
        alert("待绑定面基记录已添加！");
    }

    // 将待绑定记录绑定到指定群友
    async function bindMeetupToUser(pendingId, targetUserId) {
        if (!db || !currentUser) return;
        if (!targetUserId) { alert("请选择要绑定的群友"); return; }
        const pendingRef = db.collection("pendingMeets").doc(pendingId);
        const pendingDoc = await pendingRef.get();
        if (!pendingDoc.exists) return;
        const data = pendingDoc.data();
        // 创建或更新正式面基关系
        const id1 = currentUser;
        const id2 = targetUserId;
        const relationId = id1 < id2 ? `${id1}#${id2}` : `${id2}#${id1}`;
        const relationRef = db.collection("relations").doc(relationId);
        const relSnap = await relationRef.get();
        let meetings = [];
        if (relSnap.exists) {
            meetings = relSnap.data().meetings || [];
        }
        let finalNotes = data.notes || '';
        if (data.tempName) {
            finalNotes = finalNotes ? `[曾用临时名: ${data.tempName}] ${finalNotes}` : `[曾用临时名: ${data.tempName}]`;
        }
        meetings.push({ date: data.date, notes: finalNotes });
        await relationRef.set({
            user1: id1,
            user2: id2,
            meetings: meetings
        });
        // 删除待绑定记录
        await pendingRef.delete();
        await loadAllData();
        alert("面基记录绑定成功！");
    }

    // 删除待绑定记录
    async function deletePendingMeetup(pendingId) {
        if (!db) return;
        await db.collection("pendingMeets").doc(pendingId).delete();
        await loadAllData();
    }

    document.getElementById("deleteAccountBtn").onclick = () => {
        const myRelCount = allRelations.filter(rel => rel.user1 === currentUser || rel.user2 === currentUser).length;
        const myPendingCount = allPendingMeets.length;
        let warningMsg = `<div class="confirm-warning">
            ⚠️ <strong>危险操作</strong><br><br>
            此操作将<strong>永久删除</strong>：<br>
            • 你的账号 (@${currentUser})<br>
            • 你的所有面基关系 (${myRelCount} 段)<br>
            • 你的所有待绑定记录 (${myPendingCount} 条)<br><br>
            此操作<strong>不可撤销</strong>！
        </div>`;
        showConfirmModal('确认删除账号', warningMsg, deleteAccount);
    };
    document.getElementById("addMeetRecordBtn").onclick = async () => {
        const target = document.getElementById("targetUserSelect").value;
        const date = document.getElementById("meetDate").value;
        const notes = document.getElementById("meetNotes").value;
        const tempName = document.getElementById("tempNameInput").value.trim();
        if (!target) { alert("请选择面基对象或'暂不绑定群友'"); return; }
        if (target === "__unbound__") {
            await addUnboundMeetup(date, notes, tempName);
        } else {
            await addMeetRecord(target, date, notes);
        }
        document.getElementById("meetDate").value = "";
        document.getElementById("meetNotes").value = "";
        document.getElementById("tempNameInput").value = "";
        document.getElementById("tempNameInput").style.display = "none";
        document.getElementById("targetUserSelect").value = "";
    };
    // 选择"暂不绑定"时显示临时名字输入框
    document.getElementById("targetUserSelect").addEventListener("change", function() {
        const tempInput = document.getElementById("tempNameInput");
        if (this.value === "__unbound__") {
            tempInput.style.display = "";
        } else {
            tempInput.style.display = "none";
        }
    });
    document.getElementById("viewOtherRecordBtn").onclick = viewOtherRecord;
    // 默认今天日期
    document.getElementById("meetDate").valueAsDate = new Date();

    // 回车登录
    document.getElementById("loginUsername").addEventListener("keypress", (e) => {
        if(e.key === "Enter") document.getElementById("doLoginBtn").click();
    });
</script>
</body>
</html>
